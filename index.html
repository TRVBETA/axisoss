<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#020203" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AXIS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='none' stroke='%23c89c64' stroke-width='5'/><circle cx='50' cy='50' r='5' fill='%23c89c64'/></svg>" />
    <title>AXIS // Personal Operating System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="boot-overlay" id="system-boot-overlay">
      <div class="boot-mark">AXIS</div>
      <div class="boot-greeting" id="axis-greeting-text"></div>
      <div class="boot-subline" id="axis-greeting-subtext">
        Private system ready.
      </div>
    </div>

    <div class="axis-login-overlay hidden" id="axis-login-overlay">
      <div class="axis-login-panel">
        <div class="axis-login-mark">AXIS</div>
        <div class="axis-login-title">Return</div>
        <div class="axis-login-subtitle">
          Same brain across devices.
        </div>

        <form
          id="axis-pin-form"
          onsubmit="handleAxisPinSubmit(event)"
          style="display: flex; flex-direction: column; gap: 14px; width: 100%"
        >
          <input
            id="axis-pin-input"
            type="tel"
            inputmode="numeric"
            autocomplete="current-password"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            enterkeyhint="go"
            pattern="[0-9]*"
            class="tactical-input"
            placeholder="PIN"
            aria-label="PIN"
            style="
              text-align: center;
              font-size: 1.2rem;
              letter-spacing: 0.32em;
              -webkit-text-security: disc;
            "
          />
          <button
            type="submit"
            id="axis-pin-submit"
            class="axis-pin-submit"
            aria-label="Enter"
          >
            <span class="axis-pin-submit-label">Enter</span>
            <span class="axis-pin-submit-arrow" aria-hidden="true">→</span>
          </button>
        </form>

        <div id="axis-login-status" class="axis-login-status">
          Enter your PIN.
        </div>
      </div>
    </div>

    <header class="hud-bar">
      <div class="hud-brand" onclick="switchModule('core')">
        <span class="hud-reticle-wrap" aria-hidden="true">
          <span class="hud-reticle-halo"></span>
          <svg viewBox="0 0 100 100" class="hud-reticle-icon">
          <circle
            cx="50"
            cy="50"
            r="42"
            fill="none"
            stroke="currentColor"
            stroke-width="5"
          ></circle>
          <circle
            cx="50"
            cy="50"
            r="22"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            opacity="0.35"
          ></circle>
          <circle cx="50" cy="50" r="5" fill="currentColor"></circle>
        </svg>
        </span>
        <div class="hud-brand-text">
          <div class="hud-brand-title-row">
            <span>AXIS</span>
          </div>
          <div class="hud-meta-row">
            <div class="hud-age-chip" id="hud-age-chip">
              AGE • SET IN CONFIG
            </div>
            <div
              class="hud-sync-chip"
              id="hud-sync-chip"
              data-state="quiet"
              aria-live="polite"
              title="Quiet sync"
            >
              SYNC
            </div>
          </div>
        </div>
      </div>

      <nav class="hud-nav-tabs" aria-label="Primary navigation">
        <button
          class="nav-tab-btn active"
          id="tab-core"
          onclick="switchModule('core')"
        >
          Core
        </button>
        <button
          class="nav-tab-btn"
          id="tab-fitness"
          onclick="switchModule('fitness')"
        >
          Fitness
        </button>
        <button
          class="nav-tab-btn"
          id="tab-music"
          onclick="switchModule('music')"
        >
          Music
        </button>
        <button
          class="nav-tab-btn"
          id="tab-library"
          onclick="switchModule('library')"
        >
          Library
        </button>
        <button
          class="nav-tab-btn"
          id="tab-design"
          onclick="switchModule('design')"
        >
          Design
        </button>
        <button
          class="nav-tab-btn"
          id="tab-nutrition"
          onclick="switchModule('nutrition')"
        >
          Nutrition
        </button>
        <button
          class="nav-tab-btn"
          id="tab-finance"
          onclick="switchModule('finance')"
        >
          Finance
        </button>
        <button
          class="nav-tab-btn"
          id="tab-sleep"
          onclick="switchModule('sleep')"
        >
          Sleep
        </button>
        <button
          class="nav-tab-btn"
          id="tab-config"
          onclick="switchModule('config')"
        >
          Config
        </button>
      </nav>

      <div class="hud-time-container">
        <div>
          <div class="live-clock-text" id="hud-live-clock">12:00:00 AM</div>
          <div class="live-date-text" id="hud-live-date">
            WED // 19 JUN 2026
          </div>
        </div>
      </div>
    </header>

    <main class="axis-workspace">
      <div id="module-core" class="module-page active"></div>
      <div id="module-fitness" class="module-page"></div>
      <div id="module-music" class="module-page"></div>
      <div id="module-library" class="module-page"></div>
      <div id="module-design" class="module-page"></div>
      <div id="module-nutrition" class="module-page"></div>
      <div id="module-finance" class="module-page"></div>
      <div id="module-sleep" class="module-page"></div>
      <div id="module-config" class="module-page"></div>
    </main>

      </div>
    </div>

    <!-- AXIS V5 // Small left-edge slider. Holds only the "today in one
         line" field. The AXIS reticle trigger sits on the left edge,
         mid-low, and travels with the panel as it slides in. -->
    <button
      type="button"
      id="axis-slider-trigger"
      class="axis-slider-trigger"
      onclick="window.axisSlider && window.axisSlider.toggle()"
      aria-label="Open today note"
      aria-expanded="false"
      title="Today"
    >
      <span class="axis-slider-trigger-glow" aria-hidden="true"></span>
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="6"></circle>
        <circle cx="50" cy="50" r="5" fill="currentColor"></circle>
      </svg>
    </button>

    <div
      id="axis-slider"
      class="axis-slider"
      hidden
    >
      <div class="axis-slider-backdrop" onclick="window.axisSlider && window.axisSlider.close()"></div>
      <aside class="axis-slider-panel" role="region" aria-label="Today note">
        <div class="axis-slider-head">
          <span class="axis-slider-eyebrow" id="axis-slider-eyebrow">Today</span>
          <button
            type="button"
            id="axis-slider-history-btn"
            class="axis-slider-history-btn"
            onclick="window.axisSlider && window.axisSlider.toggleHistory()"
            aria-expanded="false"
          >History</button>
        </div>
        <textarea
          id="axis-slider-note"
          class="axis-slider-note"
          placeholder="one line. type it, leave it, change it tomorrow."
          maxlength="240"
          rows="3"
          spellcheck="false"
          aria-label="Today in one line"
        ></textarea>
        <div id="axis-slider-history" class="axis-slider-history" hidden>
          <div class="axis-slider-history-list" id="axis-slider-history-list"></div>
        </div>
      </aside>
    </div>

    <script src="auth.js"></script>
    <script src="idle.js"></script>
    <script src="slider.js"></script>
    <script src="supabase.js"></script>
    <script src="core.js"></script>
    <script src="modals.js"></script>
    <script src="fitness.js"></script>
    <script src="sleep.js"></script>
    <script src="music.js"></script>
    <script src="library.js"></script>
    <script src="design.js"></script>
    <script src="nutrition.js"></script>
    <script src="finance.js"></script>
    <script src="config.js"></script>

    <script>
      window.axisModulesBooted = false;
      window.axisAutoSyncTimer = null;
      window.axisAutoSyncBusy = false;

      function setAxisSyncState(state = "quiet", detail = "") {
        const chip = document.getElementById("hud-sync-chip");
        if (!chip) return;
        chip.textContent = "SYNC";
        chip.dataset.state = state;
        chip.title =
          detail ||
          {
            quiet: "Quiet sync",
            busy: "Syncing in background",
            warn: "Sync needs attention",
            idle: "Locked or idle",
          }[state] ||
          "Sync";
      }

      function getAxisGreeting() {
        const hour = new Date().getHours();
        if (hour < 5) return "Good night";
        if (hour < 12) return "Good morning";
        if (hour < 18) return "Good afternoon";
        return "Good evening";
      }

      function prepareAxisGreeting() {
        const greetingEl = document.getElementById("axis-greeting-text");
        const sublineEl = document.getElementById("axis-greeting-subtext");
        const name = (localStorage.getItem("axis_commander_name") || "").trim();
        if (greetingEl) greetingEl.textContent = getAxisGreeting();
        if (sublineEl) {
          sublineEl.textContent = name
            ? `${name} • private system ready.`
            : "Private system ready.";
        }
      }

      function startAxisModules() {
        if (window.axisModulesBooted) {
          if (typeof initSupabase === "function") initSupabase();
          startAxisAutoSync();
          if (typeof updateHudAgeChip === "function") updateHudAgeChip();
          setAxisSyncState("quiet");
          if (window.axisIdle && typeof window.axisIdle.init === "function") {
            window.axisIdle.init();
          }
          return;
        }

        window.axisModulesBooted = true;
        if (typeof initSupabase === "function") initSupabase();
        if (typeof initCore === "function") initCore();
        if (typeof initFitness === "function") initFitness();
        if (window.axisSleep && typeof window.axisSleep.init === "function") {
          window.axisSleep.init();
        }
        if (typeof initMusic === "function") initMusic();
        if (typeof initLibrary === "function") initLibrary();
        if (typeof initDesign === "function") initDesign();
        if (typeof initNutrition === "function") initNutrition();
        if (typeof initFinance === "function") initFinance();
        if (typeof initConfig === "function") initConfig();
        if (typeof updateHudAgeChip === "function") updateHudAgeChip();
        setAxisSyncState("quiet");
        startAxisAutoSync();
        if (window.axisIdle && typeof window.axisIdle.init === "function") {
          window.axisIdle.init();
        }
      }

      function axisUserIsEditing() {
        const el = document.activeElement;
        if (!el) return false;
        const tag = (el.tagName || "").toLowerCase();
        return (
          tag === "input" ||
          tag === "textarea" ||
          tag === "select" ||
          el.isContentEditable
        );
      }

      async function runAxisAutoSyncTick() {
        if (!window.axisAuthState?.authenticated) {
          setAxisSyncState("idle", "Locked");
          return;
        }
        if (
          typeof supabaseClient !== "undefined" &&
          supabaseClient.mode !== "online"
        ) {
          setAxisSyncState("warn", "Offline");
          return;
        }
        if (window.axisAutoSyncBusy) return;
        if (document.hidden) return;
        if (window.axisPendingDailyMutation) return;
        if (window.axisPendingCoreMutation) return;
        if (axisUserIsEditing()) return;

        window.axisAutoSyncBusy = true;
        setAxisSyncState("busy");
        try {
          const tasks = [];
          if (typeof loadDailyFromServer === "function")
            tasks.push(loadDailyFromServer({ silent: true }));
          if (typeof loadClipboardFromServer === "function")
            tasks.push(loadClipboardFromServer({ silent: true }));
          if (typeof loadFitnessFromServer === "function")
            tasks.push(loadFitnessFromServer({ silent: true }));
          if (window.axisSleep && typeof window.axisSleep.load === "function")
            tasks.push(window.axisSleep.load({ silent: true }));
          if (typeof loadNutritionFromServer === "function")
            tasks.push(loadNutritionFromServer({ silent: true }));
          if (typeof loadLibraryFromServer === "function")
            tasks.push(loadLibraryFromServer({ silent: true }));
          if (typeof loadCoreDataFromServer === "function")
            tasks.push(loadCoreDataFromServer({ silent: true }));
          await Promise.allSettled(tasks);
          setAxisSyncState("quiet");
        } catch (error) {
          console.warn("AXIS autosync tick failed:", error);
          setAxisSyncState("warn", "Sync hold");
        } finally {
          window.axisAutoSyncBusy = false;
        }
      }

      function startAxisAutoSync() {
        if (window.axisAutoSyncTimer) return;
        runAxisAutoSyncTick();
        window.axisAutoSyncTimer = setInterval(runAxisAutoSyncTick, 5000);
      }

      function stopAxisAutoSync() {
        if (!window.axisAutoSyncTimer) return;
        clearInterval(window.axisAutoSyncTimer);
        window.axisAutoSyncTimer = null;
      }

      document.addEventListener("DOMContentLoaded", () => {
        prepareAxisGreeting();
        setAxisSyncState("quiet");

        setTimeout(async () => {
          const overlay = document.getElementById("system-boot-overlay");
          if (overlay) overlay.classList.add("hidden");

          const authenticated =
            typeof ensureAxisAuthentication === "function"
              ? await ensureAxisAuthentication()
              : true;

          if (authenticated) {
            startAxisModules();
          }
        }, 2800);
      });

      function switchModule(targetModule) {
        if (window.axisAuthState && !window.axisAuthState.authenticated) return;

        document.querySelectorAll(".module-page").forEach((page) => {
          page.classList.remove("active");
        });
        document.querySelectorAll(".nav-tab-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        const pageEl = document.getElementById(`module-${targetModule}`);
        const btnEl = document.getElementById(`tab-${targetModule}`);

        if (pageEl) pageEl.classList.add("active");
        if (btnEl) btnEl.classList.add("active");

        if (targetModule === "core" && typeof refreshCoreView === "function")
          refreshCoreView();
        if (
          targetModule === "fitness" &&
          typeof refreshFitnessView === "function"
        )
          refreshFitnessView();
        if (
          targetModule === "design" &&
          typeof refreshDesignView === "function"
        )
          refreshDesignView();
        if (targetModule === "config" && typeof renderConfigView === "function")
          renderConfigView();
        if (
          targetModule === "sleep" &&
          window.axisSleep &&
          typeof window.axisSleep.refresh === "function"
        )
          window.axisSleep.refresh();
        if (window.axisNav && typeof window.axisNav.syncActive === "function") {
          window.axisNav.syncActive();
        }

        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    </script>
  </body>
</html>
