<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS // Personal Operating System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ==========================================
         SYSTEM BOOT OVERLAY
         ========================================== -->
    <div class="boot-overlay" id="system-boot-overlay">
        <svg viewBox="0 0 100 100" style="width: 72px; height: 72px; color: var(--hud-cyan); margin-bottom: 10px;">
            <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="4"/>
            <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
            <line x1="50" y1="0" x2="50" y2="18" stroke="currentColor" stroke-width="4"/>
            <line x1="50" y1="82" x2="50" y2="100" stroke="currentColor" stroke-width="4"/>
            <line x1="0" y1="50" x2="18" y2="50" stroke="currentColor" stroke-width="4"/>
            <line x1="82" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="4"/>
            <circle cx="50" cy="50" r="6" fill="var(--hud-violet)"/>
        </svg>
        <div style="font-size: 1.8rem; letter-spacing: 10px; color: var(--text-main); font-weight: bold;">AXIS // ACTUAL</div>
        <div style="font-size: 0.8rem; letter-spacing: 5px; color: var(--text-muted);">SENSORS & PIPELINE ENGAGING...</div>
        <div class="boot-bar-container">
            <div class="boot-bar-fill"></div>
        </div>
    </div>

    <!-- ==========================================
         ACCESS PIN OVERLAY
         ========================================== -->
    <div class="axis-login-overlay hidden" id="axis-login-overlay">
        <div class="axis-login-panel">
            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px; justify-content: center;">
                <svg viewBox="0 0 100 100" style="width: 42px; height: 42px; color: var(--hud-cyan);">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="6"/>
                    <circle cx="50" cy="50" r="28" fill="none" stroke="var(--hud-violet)" stroke-width="4" opacity="0.7"/>
                    <line x1="50" y1="0" x2="50" y2="20" stroke="currentColor" stroke-width="4"/>
                    <line x1="50" y1="80" x2="50" y2="100" stroke="currentColor" stroke-width="4"/>
                    <line x1="0" y1="50" x2="20" y2="50" stroke="currentColor" stroke-width="4"/>
                    <line x1="80" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="4"/>
                </svg>
                <div style="font-family: var(--font-mono); font-size: 1.5rem; letter-spacing: 6px; font-weight: bold;">AXIS ACCESS</div>
            </div>

            <div style="font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 20px;">
                PRIVATE FORTRESS // VERCEL SESSION GATE
            </div>

            <form onsubmit="handleAxisPinSubmit(event)" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
                <input id="axis-login-name" type="text" autocomplete="username" class="tactical-input" placeholder="ENTER IDENTIFIER" style="text-align: center; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase;">
                <input id="axis-pin-input" type="password" inputmode="numeric" autocomplete="current-password" class="tactical-input" placeholder="ENTER ACCESS PIN" style="text-align: center; font-size: 1.15rem; letter-spacing: 8px;">
                <button type="submit" class="tactical-btn" style="justify-content: center; width: 100%;">UNLOCK AXIS</button>
            </form>

            <div id="axis-login-status" style="margin-top: 16px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--hud-cyan); letter-spacing: 2px; min-height: 18px;">
                ENTER AXIS ACCESS PIN
            </div>
        </div>
    </div>

    <!-- ==========================================
         PERSISTENT HUD COCKPIT BAR
         ========================================== -->
    <header class="hud-bar">
        <!-- Left Brand & Reticle -->
        <div class="hud-brand" onclick="switchModule('core')">
            <svg viewBox="0 0 100 100" class="hud-reticle-icon">
                <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="6"/>
                <circle cx="50" cy="50" r="28" fill="none" stroke="var(--hud-cyan)" stroke-width="4" opacity="0.6"/>
                <line x1="50" y1="0" x2="50" y2="20" stroke="currentColor" stroke-width="4"/>
                <line x1="50" y1="80" x2="50" y2="100" stroke="currentColor" stroke-width="4"/>
                <line x1="0" y1="50" x2="20" y2="50" stroke="currentColor" stroke-width="4"/>
                <line x1="80" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="4"/>
                <circle cx="50" cy="50" r="5" fill="var(--hud-optimal)"/>
            </svg>
            <div class="hud-brand-text">
                AXIS <span class="hud-version-badge" id="hud-version-text">V4.3</span>
            </div>
        </div>

        <!-- Center Navigation Tabs -->
        <nav class="hud-nav-tabs">
            <button class="nav-tab-btn active" id="tab-core" onclick="switchModule('core')">CORE</button>
            <button class="nav-tab-btn" id="tab-fitness" onclick="switchModule('fitness')">FITNESS</button>
            <button class="nav-tab-btn" id="tab-sleep" onclick="switchModule('sleep')">SLEEP</button>
            <button class="nav-tab-btn" id="tab-music" onclick="switchModule('music')">MUSIC</button>
            <button class="nav-tab-btn" id="tab-library" onclick="switchModule('library')">LIBRARY</button>
            <button class="nav-tab-btn" id="tab-design" onclick="switchModule('design')">DESIGN</button>
            <button class="nav-tab-btn" id="tab-nutrition" onclick="switchModule('nutrition')">NUTRITION</button>
            <button class="nav-tab-btn" id="tab-finance" onclick="switchModule('finance')">FINANCE</button>
            <button class="nav-tab-btn" id="tab-config" onclick="switchModule('config')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: text-bottom; margin-right: 4px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                CONFIG
            </button>
        </nav>

        <!-- Right DB & Clock -->
        <div class="hud-time-container">
            <div class="hud-status-strip">
                <div class="hud-status-item">
                    ACCESS: <span id="hud-auth-status">CHECKING...</span>
                </div>
                <div class="hud-status-item">
                    DB: <span id="hud-db-status">LOCKED</span>
                </div>
            </div>
            <div>
                <div class="live-clock-text" id="hud-live-clock">12:00:00 AM</div>
                <div class="live-date-text" id="hud-live-date">WED // 19 JUN 2026</div>
            </div>
        </div>
    </header>

    <!-- ==========================================
         MODULE PAGE CONTAINERS
         ========================================== -->
    <main class="axis-workspace">
        <div id="module-core" class="module-page active"></div>
        <div id="module-fitness" class="module-page"></div>
        <div id="module-sleep" class="module-page"></div>
        <div id="module-music" class="module-page"></div>
        <div id="module-library" class="module-page"></div>
        <div id="module-design" class="module-page"></div>
        <div id="module-nutrition" class="module-page"></div>
        <div id="module-finance" class="module-page"></div>
        <div id="module-config" class="module-page"></div>
    </main>

    <!-- Modular JS loading -->
    <script src="auth.js"></script>
    <script src="supabase.js"></script>
    <script src="core.js"></script>
    <script src="fitness.js"></script>
    <script src="sleep.js"></script>
    <script src="music.js"></script>
    <script src="library.js"></script>
    <script src="design.js"></script>
    <script src="nutrition.js"></script>
    <script src="finance.js"></script>
    <script src="config.js"></script>

    <script>
        window.axisModulesBooted = false;
        window.axisAutoSyncTimer = null;
        window.axisAutoSyncBusy = false;

        function startAxisModules() {
            if (window.axisModulesBooted) {
                if (typeof initSupabase === 'function') initSupabase();
                startAxisAutoSync();
                return;
            }

            window.axisModulesBooted = true;
            if (typeof initSupabase === 'function') initSupabase();
            if (typeof initCore === 'function') initCore();
            if (typeof initFitness === 'function') initFitness();
            if (typeof initSleep === 'function') initSleep();
            if (typeof initMusic === 'function') initMusic();
            if (typeof initLibrary === 'function') initLibrary();
            if (typeof initDesign === 'function') initDesign();
            if (typeof initNutrition === 'function') initNutrition();
            if (typeof initFinance === 'function') initFinance();
            if (typeof initConfig === 'function') initConfig();
            startAxisAutoSync();
        }

        function axisUserIsEditing() {
            const el = document.activeElement;
            if (!el) return false;
            const tag = (el.tagName || '').toLowerCase();
            return tag === 'input' || tag === 'textarea' || tag === 'select' || el.isContentEditable;
        }

        async function runAxisAutoSyncTick() {
            if (!window.axisAuthState?.authenticated) return;
            if (window.axisAutoSyncBusy) return;
            if (document.hidden) return;
            if (window.axisPendingDailyMutation) return;
            if (axisUserIsEditing()) return;
            window.axisAutoSyncBusy = true;
            try {
                const tasks = [];
                if (typeof loadDailyFromServer === 'function') tasks.push(loadDailyFromServer({ silent: true }));
                if (typeof loadClipboardFromServer === 'function') tasks.push(loadClipboardFromServer({ silent: true }));
                if (typeof loadFitnessFromServer === 'function') tasks.push(loadFitnessFromServer({ silent: true }));
                if (typeof loadSleepFromServer === 'function') tasks.push(loadSleepFromServer({ silent: true }));
                if (typeof loadNutritionFromServer === 'function') tasks.push(loadNutritionFromServer({ silent: true }));
                if (typeof loadLibraryFromServer === 'function') tasks.push(loadLibraryFromServer({ silent: true }));
                if (typeof loadCoreDataFromServer === 'function') tasks.push(loadCoreDataFromServer({ silent: true }));
                await Promise.allSettled(tasks);
            } finally {
                window.axisAutoSyncBusy = false;
            }
        }

        function startAxisAutoSync() {
            if (window.axisAutoSyncTimer) return;
            runAxisAutoSyncTick();
            window.axisAutoSyncTimer = setInterval(runAxisAutoSyncTick, 5000);
        }

        function stopAxisAutoSync() {
            if (!window.axisAutoSyncTimer) return;
            clearInterval(window.axisAutoSyncTimer);
            window.axisAutoSyncTimer = null;
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(async () => {
                const overlay = document.getElementById('system-boot-overlay');
                if (overlay) overlay.classList.add('hidden');

                const authenticated = typeof ensureAxisAuthentication === 'function'
                    ? await ensureAxisAuthentication()
                    : true;

                if (authenticated) {
                    startAxisModules();
                }
            }, 850);
        });

        function switchModule(targetModule) {
            if (window.axisAuthState && !window.axisAuthState.authenticated) return;

            document.querySelectorAll('.module-page').forEach(page => {
                page.classList.remove('active');
            });
            document.querySelectorAll('.nav-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            const pageEl = document.getElementById(`module-${targetModule}`);
            const btnEl = document.getElementById(`tab-${targetModule}`);

            if (pageEl) pageEl.classList.add('active');
            if (btnEl) btnEl.classList.add('active');

            if (targetModule === 'core' && typeof refreshCoreView === 'function') refreshCoreView();
            if (targetModule === 'fitness' && typeof refreshFitnessView === 'function') refreshFitnessView();
            if (targetModule === 'sleep' && typeof refreshSleepView === 'function') refreshSleepView();
            if (targetModule === 'design' && typeof refreshDesignView === 'function') refreshDesignView();

            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
