<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS // Personal Operating System</title>
    <!-- Entire Visual Language // One Source of Truth -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ==========================================
         SYSTEM BOOT OVERLAY
         ========================================== -->
    <div class="boot-overlay" id="system-boot-overlay">
        <svg width="48" height="48" viewBox="0 0 100 100" class="hud-logo-icon" style="width: 64px; height: 64px;">
            <polygon points="50,10 90,90 10,90" fill="none" stroke="var(--hud-violet)" stroke-width="4"/>
            <circle cx="50" cy="62" r="16" fill="none" stroke="var(--hud-cyan)" stroke-width="2"/>
            <circle cx="50" cy="62" r="6" fill="var(--hud-violet)"/>
        </svg>
        <div style="font-size: 1.5rem; letter-spacing: 8px; color: var(--text-main); font-weight: bold;">AXIS // OS</div>
        <div style="font-size: 0.75rem; letter-spacing: 4px; color: var(--text-muted);">PRECISION FORTRESS INITIATING...</div>
        <div class="boot-bar-container">
            <div class="boot-bar-fill"></div>
        </div>
    </div>

    <!-- ==========================================
         PERSISTENT HUD NAVIGATION BAR
         ========================================== -->
    <header class="hud-bar">
        <!-- Left Brand & Version -->
        <div class="hud-brand" onclick="switchModule('core')">
            <svg viewBox="0 0 100 100" class="hud-logo-icon">
                <polygon points="50,10 90,90 10,90" fill="none" stroke="currentColor" stroke-width="6"/>
                <circle cx="50" cy="62" r="14" fill="none" stroke="var(--hud-cyan)" stroke-width="4"/>
            </svg>
            <div class="hud-brand-text">
                AXIS <span class="hud-version-badge" id="hud-version-text">OS // v4.2</span>
            </div>
        </div>

        <!-- Center Navigation Tabs -->
        <nav class="hud-nav-tabs">
            <button class="nav-tab-btn active" id="tab-core" onclick="switchModule('core')">CORE</button>
            <button class="nav-tab-btn" id="tab-fitness" onclick="switchModule('fitness')">FITNESS</button>
            <button class="nav-tab-btn" id="tab-sleep" onclick="switchModule('sleep')">SLEEP</button>
            <button class="nav-tab-btn" id="tab-music" onclick="switchModule('music')">MUSIC</button>
            <button class="nav-tab-btn" id="tab-library" onclick="switchModule('library')">LIBRARY</button>
            <button class="nav-tab-btn" id="tab-design" onclick="switchModule('design')">DESIGN</button>
            <button class="nav-tab-btn" id="tab-nutrition" onclick="switchModule('nutrition')">NUTRITION</button>
            <button class="nav-tab-btn" id="tab-finance" onclick="switchModule('finance')">FINANCE</button>
            <button class="nav-tab-btn" id="tab-config" onclick="switchModule('config')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle; margin-right: 4px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                CONFIG
            </button>
        </nav>

        <!-- Right Clock & DB Status -->
        <div class="hud-time-container">
            <div class="hud-status-strip">
                <div class="hud-status-item">
                    DB: <span id="hud-db-status">STANDBY</span>
                </div>
            </div>
            <div>
                <div class="live-clock-text" id="hud-live-clock">12:00:00 AM</div>
                <div class="live-date-text" id="hud-live-date">WED // 19 JUN 2026</div>
            </div>
        </div>
    </header>

    <!-- ==========================================
         MODULE PAGE CONTAINERS // SWAPPED BY JS
         ========================================== -->
    <main class="axis-workspace">
        
        <!-- 1. CORE (Home) -->
        <div id="module-core" class="module-page active">
            <!-- Rendered by core.js -->
        </div>

        <!-- 2. FITNESS -->
        <div id="module-fitness" class="module-page">
            <!-- Rendered by fitness.js -->
        </div>

        <!-- 3. SLEEP -->
        <div id="module-sleep" class="module-page">
            <!-- Rendered by sleep.js -->
        </div>

        <!-- 4. MUSIC (Private Player) -->
        <div id="module-music" class="module-page">
            <!-- Rendered by music.js -->
        </div>

        <!-- 5. LIBRARY -->
        <div id="module-library" class="module-page">
            <!-- Rendered by library.js -->
        </div>

        <!-- 6. DESIGN -->
        <div id="module-design" class="module-page">
            <!-- Rendered by design.js -->
        </div>

        <!-- 7. NUTRITION -->
        <div id="module-nutrition" class="module-page">
            <!-- Rendered by nutrition.js -->
        </div>

        <!-- 8. FINANCE (Phase 3) -->
        <div id="module-finance" class="module-page">
            <!-- Rendered by finance.js -->
        </div>

        <!-- 9. HUD CONFIG -->
        <div id="module-config" class="module-page">
            <!-- Rendered by config.js -->
        </div>

    </main>

    <!-- ==========================================
         MODULAR JAVASCRIPT ENGINE
         Loaded in strict Master Plan order
         ========================================== -->
    <script src="supabase.js"></script>
    <script src="core.js"></script>
    <script src="fitness.js"></script>
    <script src="sleep.js"></script>
    <script src="music.js"></script>
    <script src="library.js"></script>
    <script src="design.js"></script>
    <script src="nutrition.js"></script>
    <script src="finance.js"></script>
    <script src="config.js"></script>

    <script>
        // System Boot Trigger
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const overlay = document.getElementById('system-boot-overlay');
                if (overlay) overlay.classList.add('hidden');
                
                // Initialize all modules if their init functions exist
                if (typeof initSupabase === 'function') initSupabase();
                if (typeof initCore === 'function') initCore();
                if (typeof initFitness === 'function') initFitness();
                if (typeof initSleep === 'function') initSleep();
                if (typeof initMusic === 'function') initMusic();
                if (typeof initLibrary === 'function') initLibrary();
                if (typeof initDesign === 'function') initDesign();
                if (typeof initNutrition === 'function') initNutrition();
                if (typeof initFinance === 'function') initFinance();
                if (typeof initConfig === 'function') initConfig();
            }, 850);
        });

        // Full Page Swap Engine per Module
        function switchModule(targetModule) {
            document.querySelectorAll('.module-page').forEach(page => {
                page.classList.remove('active');
            });
            document.querySelectorAll('.nav-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            const pageEl = document.getElementById(`module-${targetModule}`);
            const btnEl = document.getElementById(`tab-${targetModule}`);

            if (pageEl) pageEl.classList.add('active');
            if (btnEl) btnEl.classList.add('active');

            // Trigger module specific refresh if exists
            if (targetModule === 'core' && typeof refreshCoreView === 'function') refreshCoreView();
            if (targetModule === 'fitness' && typeof refreshFitnessView === 'function') refreshFitnessView();
            if (targetModule === 'sleep' && typeof refreshSleepView === 'function') refreshSleepView();
            if (targetModule === 'design' && typeof refreshDesignView === 'function') refreshDesignView();

            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
