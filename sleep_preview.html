<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXIS // Sleep Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="boot-overlay hidden" id="system-boot-overlay">
      <div class="boot-mark">AXIS</div>
      <div class="boot-greeting">Good evening</div>
    </div>
    <header class="hud-bar">
      <div class="hud-brand">
        <span class="hud-reticle-wrap" aria-hidden="true">
          <span class="hud-reticle-halo"></span>
          <svg viewBox="0 0 100 100" class="hud-reticle-icon">
            <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="5"></circle>
            <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="2" opacity="0.35"></circle>
            <circle cx="50" cy="50" r="5" fill="currentColor"></circle>
          </svg>
        </span>
        <div class="hud-brand-text">
          <div class="hud-brand-title-row"><span>AXIS</span></div>
        </div>
      </div>
    </header>
    <main class="axis-workspace">
      <div id="module-sleep" class="module-page active"></div>
    </main>

    <script src="sleep.js"></script>
    <script>
      // Stub the auth + supabase so the module can boot.
      window.axisAuthState = { authenticated: true };
      window.supabaseClient = { mode: 'online' };

      // Pre-seed local state with realistic data so the preview renders meaningfully.
      const now = Date.now();
      const lastWake = new Date(now - 2 * 60 * 60 * 1000);     // woke 2h ago
      const lastSleep = new Date(now - 9 * 60 * 60 * 1000);    // slept 9h ago
      localStorage.setItem('axis_sleep_state_v1', JSON.stringify({
        currentEvent: 'awake',
        lastWakeAt: lastWake.toISOString(),
        lastSleepAt: lastSleep.toISOString(),
        lastSleepHours: 7.0,
        lastSleepQuality: 4
      }));

      // Boot the page directly.
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('system-boot-overlay').classList.add('hidden');
        window.axisSleep.init();
      });
    </script>
  </body>
</html>
