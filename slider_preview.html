<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>AXIS // Slider Preview</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { display: flex; justify-content: center; background: #1a1a1d; min-height: 100vh; padding: 24px 0; }
      .frame {
        width: 1280px; max-width: 100%; background: var(--bg-void);
        border-radius: 18px; border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 30px 80px rgba(0,0,0,0.5); overflow: hidden;
        min-height: 800px; position: relative;
      }
      .label {
        position: fixed; top: 8px; right: 8px; font-family: var(--font-mono);
        font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase;
      }
      .stage-buttons { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 99999; }
      .stage-buttons button { font-family: var(--font-mono); font-size: 0.7rem; padding: 8px 14px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="label">1280px // small slider preview</div>
    <div class="frame">
      <header class="hud-bar">
        <div class="hud-brand">
          <span class="hud-reticle-wrap" aria-hidden="true">
            <span class="hud-reticle-halo"></span>
            <svg viewBox="0 0 100 100" class="hud-reticle-icon">
              <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="5"></circle>
              <circle cx="50" cy="50" r="22" fill="none" stroke="currentColor" stroke-width="2" opacity="0.35"></circle>
              <circle cx="50" cy="50" r="5" fill="currentColor"></circle>
            </svg>
          </span>
          <div class="hud-brand-text">
            <div class="hud-brand-title-row"><span>AXIS</span></div>
            <div class="hud-meta-row">
              <div class="hud-age-chip">AGE • SET IN CONFIG</div>
              <div class="hud-sync-chip" data-state="quiet">SYNC</div>
            </div>
          </div>
        </div>
        <nav class="hud-nav-tabs" aria-label="Primary navigation">
          <button class="nav-tab-btn active">Core</button>
          <button class="nav-tab-btn">Fitness</button>
          <button class="nav-tab-btn">Music</button>
          <button class="nav-tab-btn">Library</button>
          <button class="nav-tab-btn">Design</button>
          <button class="nav-tab-btn">Nutrition</button>
          <button class="nav-tab-btn">Finance</button>
          <button class="nav-tab-btn">Sleep</button>
          <button class="nav-tab-btn">Config</button>
        </nav>
        <div class="hud-time-container">
          <div>
            <div class="live-clock-text">9:42 PM</div>
            <div class="live-date-text">WED // 22 JUL</div>
          </div>
        </div>
      </header>

      <main class="axis-workspace">
        <div class="cockpit-card" style="padding: 30px;">
          <span class="axis-section-overline">Today</span>
          <div class="axis-score-figure">78</div>
          <div class="axis-quiet-note">Real work landed. Keep stacking.</div>
        </div>
      </main>

      <button type="button" id="axis-slider-trigger" class="axis-slider-trigger" onclick="window.axisSlider && window.axisSlider.toggle()" aria-label="Open today note" aria-expanded="false" title="Today">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="42" fill="none" stroke="currentColor" stroke-width="6"></circle>
          <circle cx="50" cy="50" r="5" fill="currentColor"></circle>
        </svg>
      </button>

      <div id="axis-slider" class="axis-slider" hidden>
        <div class="axis-slider-backdrop" onclick="window.axisSlider && window.axisSlider.close()"></div>
        <aside class="axis-slider-panel" role="region" aria-label="Today note">
          <div class="axis-slider-head"><span class="axis-slider-eyebrow">Today</span></div>
          <textarea id="axis-slider-note" class="axis-slider-note" placeholder="one line. type it, leave it, change it tomorrow." maxlength="240" rows="3" spellcheck="false" aria-label="Today in one line"></textarea>
        </aside>
      </div>
    </div>

    <div class="stage-buttons">
      <button onclick="window.axisSlider && window.axisSlider.open()">Open slider</button>
      <button onclick="window.axisSlider && window.axisSlider.close()">Close slider</button>
    </div>

    <script src="slider.js"></script>
    <script>
      try { localStorage.setItem('axis_today_line', "Ship V5.1. Don't touch what works."); } catch (_) {}
      document.addEventListener('DOMContentLoaded', () => {
        const note = document.getElementById('axis-slider-note');
        if (note) {
          try {
            const v = localStorage.getItem('axis_today_line');
            if (v != null) note.value = v;
          } catch (_) {}
        }
      });
    </script>
  </body>
</html>
