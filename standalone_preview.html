<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS // Personal Operating System</title>
    <style>
/* ==========================================
   AXIS // Core Visual Language // Fighter Jet Cockpit
   One Source of Truth
   ========================================== */

:root {
    --bg-void: #03050a;
    --bg-surface: #080c16;
    --bg-surface-glass: rgba(8, 12, 22, 0.85);
    --bg-card: #0d1322;
    --bg-card-hover: #131b2e;
    
    --hud-violet: #a855f7;
    --hud-violet-glow: rgba(168, 85, 247, 0.4);
    --hud-violet-subtle: rgba(168, 85, 247, 0.15);

    --hud-cyan: #38bdf8;
    --hud-cyan-glow: rgba(56, 189, 248, 0.3);

    --hud-optimal: #10b981;
    --hud-warning: #f59e0b;
    --hud-critical: #f43f5e;

    --text-main: #f1f5f9;
    --text-muted: #64748b;
    --text-dark: #03050a;

    --font-mono: 'Courier New', Consolas, monospace;
    --font-body: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

    --clip-corner: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    --clip-corner-sm: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    background-color: var(--bg-void);
    color: var(--text-main);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative;
    background-image: 
        radial-gradient(circle at 50% 50%, var(--hud-violet-subtle) 0%, transparent 60%),
        linear-gradient(to right, rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
    background-size: 100% 100%, 30px 30px, 30px 30px;
    background-position: center;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.3) 50%
    );
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-void); }
::-webkit-scrollbar-thumb { background: var(--hud-violet-subtle); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--hud-violet); }

/* ==========================================
   PERSISTENT HUD COCKPIT BAR
   Generous Enterprise Padding & Margins
   ========================================== */
header.hud-bar {
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--hud-violet-subtle);
    background: var(--bg-surface-glass);
    backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    gap: 32px;
}

.hud-brand {
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    flex-shrink: 0;
}

/* Subtle Fighter Jet HUD Reticle Crosshair (No Spinning) */
.hud-reticle-icon {
    width: 32px;
    height: 32px;
    color: var(--hud-cyan);
    filter: drop-shadow(0 0 8px var(--hud-cyan-glow));
    animation: reticle-breath 4s ease-in-out infinite;
}

@keyframes reticle-breath {
    0%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px var(--hud-cyan)); }
    50% { opacity: 0.75; transform: scale(0.96); filter: drop-shadow(0 0 2px var(--hud-cyan-subtle)); }
}

.hud-brand-text {
    font-family: var(--font-mono);
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 12px;
}

.hud-version-badge {
    font-size: 0.7rem;
    background: var(--hud-violet-subtle);
    color: var(--hud-violet);
    padding: 3px 8px;
    border: 1px solid var(--hud-violet);
    border-radius: 2px;
    letter-spacing: 3px;
}

.hud-status-strip {
    display: flex;
    gap: 24px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-muted);
    align-items: center;
}

.hud-status-item {
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
}

.hud-status-item span {
    color: var(--hud-optimal);
    font-weight: bold;
}

.hud-nav-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
}

.nav-tab-btn {
    background: var(--bg-card);
    border: 1px solid transparent;
    color: var(--text-muted);
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    clip-path: var(--clip-corner-sm);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.nav-tab-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-main);
    border-color: var(--hud-violet-subtle);
    transform: translateY(-2px);
}

.nav-tab-btn.active {
    background: var(--hud-violet);
    color: var(--text-dark);
    border-color: var(--hud-violet);
    box-shadow: 0 0 20px var(--hud-violet-glow);
    transform: translateY(0);
}

.hud-time-container {
    display: flex;
    align-items: center;
    gap: 32px;
    flex-shrink: 0;
}

.live-clock-text {
    font-family: var(--font-mono);
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--hud-cyan);
    letter-spacing: 2px;
    text-shadow: 0 0 12px var(--hud-cyan-glow);
    text-align: right;
}

.live-date-text {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: right;
    margin-top: 2px;
}

/* ==========================================
   MODULE PAGE CONTAINERS
   Cinematic Spring Easing Easing
   ========================================== */
main.axis-workspace {
    flex: 1;
    padding: 40px;
    max-width: 1600px;
    margin: 0 auto;
    width: 100%;
}

.module-page {
    display: none;
    opacity: 0;
    transform: translateY(15px) scale(0.99);
    transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1), transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.module-page.active {
    display: flex;
    flex-direction: column;
    gap: 40px;
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* Tactical UI Elements */
.cockpit-card {
    background: var(--bg-card);
    border: 1px solid var(--hud-violet-subtle);
    clip-path: var(--clip-corner);
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    position: relative;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.cockpit-card:hover {
    border-color: var(--hud-violet);
    box-shadow: 0 12px 35px rgba(0,0,0,0.7), 0 0 20px var(--hud-violet-subtle);
}

.cockpit-header {
    font-family: var(--font-mono);
    font-size: 1.15rem;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--hud-violet);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-bottom: 14px;
    text-transform: uppercase;
}

.tactical-btn {
    background: var(--bg-surface);
    border: 1px solid var(--hud-violet);
    color: var(--text-main);
    padding: 12px 24px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
    clip-path: var(--clip-corner-sm);
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
}

.tactical-btn:hover {
    background: var(--hud-violet);
    color: var(--text-dark);
    box-shadow: 0 0 20px var(--hud-violet-glow);
    transform: scale(1.02);
}

.tactical-btn.cyan {
    border-color: var(--hud-cyan);
}
.tactical-btn.cyan:hover {
    background: var(--hud-cyan);
    color: var(--text-dark);
    box-shadow: 0 0 20px var(--hud-cyan-glow);
}

.tactical-btn.optimal {
    border-color: var(--hud-optimal);
}
.tactical-btn.optimal:hover {
    background: var(--hud-optimal);
    color: var(--text-dark);
    box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
}

.tactical-input, .tactical-select {
    background: var(--bg-surface);
    border: 1px solid var(--text-muted);
    color: var(--text-main);
    padding: 14px 18px;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    outline: none;
    clip-path: var(--clip-corner-sm);
    transition: all 0.2s;
}

.tactical-input:focus, .tactical-select:focus {
    border-color: var(--hud-violet);
    box-shadow: 0 0 15px var(--hud-violet-subtle);
}

/* System Boot Overlay */
.boot-overlay {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: var(--bg-void);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    font-family: var(--font-mono);
    transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.boot-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.boot-bar-container {
    width: 320px;
    height: 4px;
    background: var(--bg-surface);
    position: relative;
    overflow: hidden;
}

.boot-bar-fill {
    position: absolute;
    top: 0; left: 0; height: 100%;
    width: 0%;
    background: var(--hud-cyan);
    box-shadow: 0 0 15px var(--hud-cyan);
    animation: boot-load 0.85s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes boot-load {
    to { width: 100%; }
}
</style>

<script>
// --- supabase.js ---
/* ==========================================
   AXIS // supabase.js
   PostgREST API Client & Introspection Verification Ping
   ========================================== */

let supabaseClient = {
    url: localStorage.getItem('axis_supabase_url') || '',
    key: localStorage.getItem('axis_supabase_key') || '',
    mode: 'offline', // 'online' or 'offline'
};

function initSupabase() {
    verifyDatabaseConnection();
}

async function verifyDatabaseConnection() {
    const statusEl = document.getElementById('hud-db-status');
    if (!supabaseClient.url || !supabaseClient.key) {
        setLocalStandby(statusEl);
        return;
    }

    try {
        if (statusEl) {
            statusEl.textContent = 'PINGING...';
            statusEl.style.color = 'var(--hud-cyan)';
        }

        let resp = await fetch(`${supabaseClient.url}/rest/v1/`, {
            method: 'GET',
            headers: {
                'apikey': supabaseClient.key,
                'Authorization': `Bearer ${supabaseClient.key}`,
                'Content-Type': 'application/json'
            },
            timeout: 6000
        });

        if (resp.ok) {
            supabaseClient.mode = 'online';
            if (statusEl) {
                statusEl.textContent = 'ONLINE // VERIFIED';
                statusEl.style.color = 'var(--hud-optimal)';
            }
        } else {
            throw new Error('Key rejected');
        }
    } catch (e) {
        supabaseClient.mode = 'offline';
        if (statusEl) {
            statusEl.textContent = 'FAULT // MOCK MEMORY';
            statusEl.style.color = 'var(--hud-critical)';
        }
    }
}

async function dbExecute(table, method = 'GET', body = null, matchParams = {}) {
    if (supabaseClient.mode === 'online') {
        let endpoint = `${supabaseClient.url}/rest/v1/${table}`;
        let headers = {
            'apikey': supabaseClient.key,
            'Authorization': `Bearer ${supabaseClient.key}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        let queryParts = [];
        if (method === 'GET' && Object.keys(matchParams).length > 0) {
            for (let k in matchParams) {
                queryParts.push(`${encodeURIComponent(k)}=eq.${encodeURIComponent(matchParams[k])}`);
            }
        }
        if (queryParts.length > 0) endpoint += `?${queryParts.join('&')}`;

        try {
            let options = { method, headers };
            if (body) options.body = JSON.stringify(body);

            let resp = await fetch(endpoint, options);
            if (!resp.ok) throw new Error(`DB fail: ${resp.status}`);
            return await resp.json();
        } catch(e) {
            return dbExecuteLocal(table, method, body, matchParams);
        }
    } else {
        return dbExecuteLocal(table, method, body, matchParams);
    }
}

function dbExecuteLocal(table, method, body, matchParams) {
    let storageKey = `axis_db_${table}`;
    let data = JSON.parse(localStorage.getItem(storageKey) || '[]');

    if (method === 'GET') {
        if (Object.keys(matchParams).length === 0) return data;
        return data.filter(item => {
            for (let k in matchParams) {
                if (item[k] !== matchParams[k]) return false;
            }
            return true;
        });
    }

    if (method === 'POST') {
        let newRecord = { id: Date.now(), created_at: new Date().toISOString(), ...body };
        data.push(newRecord);
        localStorage.setItem(storageKey, JSON.stringify(data));
        return [newRecord];
    }

    if (method === 'PATCH' || method === 'PUT') {
        let updated = [];
        data = data.map(item => {
            let matches = true;
            for (let k in matchParams) {
                if (item[k] !== matchParams[k]) matches = false;
            }
            if (matches) {
                let rec = { ...item, ...body };
                updated.push(rec);
                return rec;
            }
            return item;
        });
        localStorage.setItem(storageKey, JSON.stringify(data));
        return updated;
    }

    if (method === 'DELETE') {
        data = data.filter(item => {
            for (let k in matchParams) {
                if (item[k] === matchParams[k]) return false;
            }
            return true;
        });
        localStorage.setItem(storageKey, JSON.stringify(data));
        return [];
    }

    return [];
}

function setLocalStandby(statusEl) {
    supabaseClient.mode = 'offline';
    if (statusEl) {
        statusEl.textContent = 'STANDBY // LOCAL MEMORY';
        statusEl.style.color = 'var(--text-muted)';
    }
}

/* Precise 12h Live Chronometer */
function init12hClock() {
    const timeEl = document.getElementById('hud-live-clock');
    const dateEl = document.getElementById('hud-live-date');

    function update() {
        const now = new Date();
        
        let h = now.getHours();
        let m = String(now.getMinutes()).padStart(2, '0');
        let s = String(now.getSeconds()).padStart(2, '0');
        let ampm = h >= 12 ? 'PM' : 'AM';
        
        h = h % 12;
        h = h ? h : 12; // convert 0 to 12
        h = String(h).padStart(2, '0');

        if(timeEl) timeEl.textContent = `${h}:${m}:${s} ${ampm}`;

        const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        
        let dayName = days[now.getDay()];
        let dayNum = String(now.getDate()).padStart(2, '0');
        let monthName = months[now.getMonth()];
        let year = now.getFullYear();

        if(dateEl) dateEl.textContent = `${dayName} // ${dayNum} ${monthName} ${year}`;
    }

    update();
    setInterval(update, 500);
}

/* Compute Daily 100-Point Formula */
function computeDailyScore() {
    let pts = 0;
    
    // Gym session logged: 40 pts
    if (todayTelemetry.gymLogged) pts += 40;

    // Design hours logged (min 1h): 30 pts max
    if (todayTelemetry.designHours >= 1) {
        pts += 30;
    } else if (todayTelemetry.designHours > 0) {
        // partial credit
        pts += Math.round(todayTelemetry.designHours * 30);
    }

    // Sleep logged: 10 pts
    if (todayTelemetry.sleepHours > 0) pts += 10;

    // Water goal hit (4L): 10 pts max. Partial credit (e.g. 2L = 5pts)
    let waterPts = Math.min(10, Math.round((todayTelemetry.waterLiters / 4.0) * 10));
    pts += waterPts;

    // Went outside: 5 pts
    if (todayTelemetry.wentOutside) pts += 5;

    // Tutorial/video watched: 5 pts
    if (todayTelemetry.watchedTutorial) pts += 5;

    return Math.min(100, pts);
}

/* Derive 7 Revolution Rank */
function getCurrentRank() {
    let total = todayTelemetry.totalHistoricalScore;
    let rank = REVOLUTION_RANKS[0];

    for (let r of REVOLUTION_RANKS) {
        if (total >= r.minScoreSum) {
            rank = r;
        } else {
            break;
        }
    }
    return rank;
}

/* Calculate Last Logged String of Truth */
function getLastLoggedString() {
    if (!todayTelemetry.lastLoggedTimestamp) return "NOTHING LOGGED TODAY";
    
    let diffMinutes = Math.floor((Date.now() - todayTelemetry.lastLoggedTimestamp) / (1000 * 60));
    if (diffMinutes < 1) return "LAST LOGGED: JUST NOW";
    if (diffMinutes < 60) return `LAST LOGGED: ${diffMinutes} MINUTES AGO`;
    
    let diffHours = Math.floor(diffMinutes / 60);
    return `LAST LOGGED: ${diffHours} HOURS AGO`;
}

/* Helper to update timestamp and trigger render */
function injectQuickTelemetry(type) {
    todayTelemetry.lastLoggedTimestamp = Date.now();
    localStorage.setItem('axis_last_logged_time', todayTelemetry.lastLoggedTimestamp);

    if (type === 'gym') {
        todayTelemetry.gymLogged = true;
        todayTelemetry.gymSplit = 'Chest + Back';
        localStorage.setItem('axis_today_gym', 'true');
        localStorage.setItem('axis_today_gym_split', 'Chest + Back');
    } else if (type === 'design') {
        todayTelemetry.designHours = Math.min(10, todayTelemetry.designHours + 2);
        localStorage.setItem('axis_today_design', todayTelemetry.designHours);
    } else if (type === 'water') {
        todayTelemetry.waterLiters = parseFloat((todayTelemetry.waterLiters + 0.6).toFixed(1));
        localStorage.setItem('axis_today_water', todayTelemetry.waterLiters);
        if (typeof refreshFitnessWater === 'function') refreshFitnessWater();
    } else if (type === 'outside') {
        todayTelemetry.wentOutside = true;
        localStorage.setItem('axis_today_outside', 'true');
    } else if (type === 'reset') {
        todayTelemetry.gymLogged = false;
        todayTelemetry.gymSplit = 'None';
        todayTelemetry.designHours = 0;
        todayTelemetry.waterLiters = 0;
        todayTelemetry.sleepHours = 0;
        todayTelemetry.wentOutside = false;
        todayTelemetry.watchedTutorial = false;
        todayTelemetry.lastLoggedTimestamp = 0;
        localStorage.clear();
    }

    renderCoreHome();
}

function initEKGCanvas() {
    const canvas = document.getElementById('fitness-ekg-canvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');

    let width = canvas.width = canvas.parentElement.clientWidth || 700;
    let height = canvas.height = canvas.parentElement.clientHeight || 200;

    let scanlineX = 0;

    function draw() {
        if(!document.getElementById('fitness-ekg-canvas')) return; // exit if page swapped

        ctx.fillStyle = 'rgba(8, 12, 22, 0.2)';
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = 'rgba(16, 185, 129, 0.08)';
        ctx.lineWidth = 1;
        for(let x=0; x<width; x+=25) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
        for(let y=0; y<height; y+=25) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }

        scanlineX += 5;
        if(scanlineX >= width) scanlineX = 0;

        ctx.strokeStyle = 'var(--hud-optimal)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(scanlineX, 0); ctx.lineTo(scanlineX, height); ctx.stroke();

        ctx.strokeStyle = 'var(--hud-optimal)';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'var(--hud-optimal)';
        ctx.beginPath();
        
        let startY = height / 2;
        ctx.moveTo(0, startY);

        for(let x=0; x<width; x+=5) {
            let y = startY;
            let cyclePos = (x + (width - scanlineX) + 24000) % 240;
            if(cyclePos > 100 && cyclePos < 140) {
                if(cyclePos < 110) y -= 15;
                else if(cyclePos < 118) y += 12;
                else if(cyclePos < 124) y -= 70;
                else if(cyclePos < 130) y += 30;
                else y -= 10;
            }
            y += (Math.random() - 0.5) * 3;
            ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        requestAnimationFrame(draw);
    }

    draw();
}

function switchPrivateProject(projIdx) {
    activePlayerState.currentProjectIdx = projIdx;
    activePlayerState.currentTrackIdx = 0;
    if(activePlayerState.isPlaying) stopProceduralSynth();
    renderMusicView();
}

function loadPrivateTrack(trackIdx) {
    activePlayerState.currentTrackIdx = trackIdx;
    if(activePlayerState.isPlaying) {
        stopProceduralSynth();
        startProceduralSynth();
    }
    renderMusicView();
}

function togglePrivatePlay() {
    if(activePlayerState.isPlaying) {
        stopProceduralSynth();
    } else {
        startProceduralSynth();
    }
    renderMusicView();
}

function nextPrivateTrack() {
    let proj = musicProjects[activePlayerState.currentProjectIdx];
    activePlayerState.currentTrackIdx = (activePlayerState.currentTrackIdx + 1) % proj.tracks.length;
    if(activePlayerState.isPlaying) {
        stopProceduralSynth();
        startProceduralSynth();
    }
    renderMusicView();
}

function prevPrivateTrack() {
    let proj = musicProjects[activePlayerState.currentProjectIdx];
    activePlayerState.currentTrackIdx = (activePlayerState.currentTrackIdx - 1 + proj.tracks.length) % proj.tracks.length;
    if(activePlayerState.isPlaying) {
        stopProceduralSynth();
        startProceduralSynth();
    }
    renderMusicView();
}

function updatePrivateVolume(vol) {
    activePlayerState.volume = parseFloat(vol);
    if(activePlayerState.synthGain) {
        try { activePlayerState.synthGain.gain.setValueAtTime(activePlayerState.volume * 0.2, getMusicAudioContext().currentTime); } catch(e){}
    }
}

function scrubPrivateTrack(e) {
    const bar = e.currentTarget;
    const rect = bar.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    let fill = document.getElementById('player-scrubber-fill');
    if(fill) fill.style.width = `${pos * 100}%`;
}

/* Intelligent Web Audio Engine */
let musicAudioCtx = null;
function getMusicAudioContext() {
    if (!musicAudioCtx) {
        const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
        musicAudioCtx = new AudioCtxClass();
    }
    if (musicAudioCtx.state === 'suspended') musicAudioCtx.resume();
    return musicAudioCtx;
}

function startProceduralSynth() {
    try {
        const ctx = getMusicAudioContext();
        stopProceduralSynth();

        let proj = musicProjects[activePlayerState.currentProjectIdx];
        let track = proj.tracks[activePlayerState.currentTrackIdx];
        let baseFreq = track.synthFreq || 130.81;

        activePlayerState.synthGain = ctx.createGain();
        activePlayerState.synthGain.gain.setValueAtTime(0.01, ctx.currentTime);
        activePlayerState.synthGain.gain.linearRampToValueAtTime(activePlayerState.volume * 0.25, ctx.currentTime + 1.5);

        // Low Pass Filter for relaxing cinematic space depth
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(500, ctx.currentTime);

        activePlayerState.synthGain.connect(filter);
        filter.connect(ctx.destination);

        // Space Triad Chord
        let chord = [baseFreq, baseFreq * 1.5, baseFreq * 1.875];
        activePlayerState.synthOscs = [];

        chord.forEach((f, idx) => {
            const osc = ctx.createOscillator();
            osc.type = idx % 2 === 0 ? 'sawtooth' : 'triangle';
            osc.frequency.setValueAtTime(f, ctx.currentTime);
            osc.connect(activePlayerState.synthGain);
            osc.start();
            activePlayerState.synthOscs.push(osc);
        });

        activePlayerState.isPlaying = true;
    } catch(e) {
        console.warn('Procedural Synth failed', e);
    }
}

function stopProceduralSynth() {
    if (activePlayerState.synthOscs.length > 0) {
        activePlayerState.synthOscs.forEach(o => { try{o.stop(); o.disconnect();}catch(e){} });
        activePlayerState.synthOscs = [];
    }
    if (activePlayerState.synthGain) {
        try{activePlayerState.synthGain.disconnect();}catch(e){}
        activePlayerState.synthGain = null;
    }
    activePlayerState.isPlaying = false;
}

function handlePrivateUpload(e) {
    e.preventDefault();
    let targetProjIdx = parseInt(document.getElementById('upload-proj-id').value);
    let title = document.getElementById('upload-track-title').value.trim();
    let url = document.getElementById('upload-track-url').value.trim();

    if(!title) return;

    let newTrack = {
        id: "t-" + Date.now(),
        name: title,
        duration: "03:50",
        audioUrl: url,
        isSynth: true,
        synthFreq: 110 + Math.floor(Math.random() * 100)
    };

    musicProjects[targetProjIdx].tracks.push(newTrack);
    localStorage.setItem('axis_music_projects', JSON.stringify(musicProjects));

    renderMusicView();
}

let idbDatabase = null;
function initLibraryIndexedDB() {
    return new Promise((resolve, reject) => {
        let req = indexedDB.open("AXIS_LIBRARY_DB", 1);
        req.onupgradeneeded = function(e) {
            let db = e.target.result;
            if (!db.objectStoreNames.contains("books_binary")) {
                db.createObjectStore("books_binary", { keyPath: "id" });
            }
        };
        req.onsuccess = function(e) {
            idbDatabase = e.target.result;
            resolve(idbDatabase);
        };
        req.onerror = function(e) {
            console.error("IDB init failed", e);
            reject(e);
        };
    });
}

function saveBookBinaryToIDB(bookId, blobOrDataUri) {
    return new Promise((resolve, reject) => {
        if (!idbDatabase) return reject("IDB not ready");
        let tx = idbDatabase.transaction(["books_binary"], "readwrite");
        let store = tx.objectStore("books_binary");
        store.put({ id: bookId, content: blobOrDataUri });
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e);
    });
}

function getBookBinaryFromIDB(bookId) {
    return new Promise((resolve, reject) => {
        if (!idbDatabase) return reject("IDB not ready");
        let tx = idbDatabase.transaction(["books_binary"], "readonly");
        let store = tx.objectStore("books_binary");
        let req = store.get(bookId);
        req.onsuccess = () => resolve(req.result ? req.result.content : null);
        req.onerror = (e) => reject(e);
    });
}

function deleteBookBinaryFromIDB(bookId) {
    return new Promise((resolve, reject) => {
        if (!idbDatabase) return resolve();
        let tx = idbDatabase.transaction(["books_binary"], "readwrite");
        let store = tx.objectStore("books_binary");
        store.delete(bookId);
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e);
    });
}

/* Autonomously intercept and extract genuinely selected file metadata */
function executeInstantMetadataExtraction(inputEl) {
    let file = inputEl.files[0];
    if (!file) return;

    let titleReadout = document.getElementById('parse-readout-title');
    let authorReadout = document.getElementById('parse-readout-author');
    let pagesReadout = document.getElementById('parse-readout-pages');

    let isPdf = file.name.toLowerCase().endsWith('.pdf');

    // Default basic clean name fallback
    let cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/[_━-]/g, " ").trim();
    if(titleReadout) titleReadout.textContent = cleanName.toUpperCase();
    if(authorReadout) authorReadout.textContent = isPdf ? "AUTHOR // PDF DOCUMENT" : "AUTHOR // EPUB SPEC";
    if(pagesReadout) pagesReadout.textContent = "PAGES // ~300";

    tacticalLibraryState.activeExtractedCover = null;

    if (!isPdf && typeof ePub !== 'undefined') {
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let tempBook = ePub(e.target.result);
                tempBook.loaded.metadata.then(meta => {
                    if (meta.title && titleReadout) titleReadout.textContent = meta.title.toUpperCase();
                    if (meta.creator && authorReadout) authorReadout.textContent = `AUTHOR // ${meta.creator.toUpperCase()}`;
                }).catch(err => {});

                // Extract genuine cover URI if possible
                tempBook.coverUrl().then(url => {
                    if(url) tacticalLibraryState.activeExtractedCover = url;
                }).catch(err => {});
            } catch(ex) {}
        };
        reader.readAsArrayBuffer(file);
    }
}

/* Submit Autonomous Deposit */
function handleAutonomousLibraryDeposit(e) {
    e.preventDefault();

    let fileInput = document.getElementById('lib-auto-file');
    let file = fileInput.files[0];
    let carryForward = document.getElementById('lib-auto-carry').checked;

    if (!file) return;

    let isPdf = file.name.toLowerCase().endsWith('.pdf');
    let fileType = isPdf ? 'pdf' : 'epub';

    let bookId = "lib-" + Date.now();

    let titleText = document.getElementById('parse-readout-title').textContent || file.name.toUpperCase();
    let authorText = document.getElementById('parse-readout-author').textContent.replace("AUTHOR // ", "") || "AXIS ACTUAL";

    let btn = document.getElementById('lib-commit-btn');
    if(btn) {
        btn.textContent = "WRITING TO IDB MEMORY...";
        btn.style.color = "var(--hud-optimal)";
    }

    let reader = new FileReader();
    reader.onload = function(event) {
        let binaryPayload = event.target.result;

        saveBookBinaryToIDB(bookId, binaryPayload).then(() => {
            
            let metaRecord = {
                id: bookId,
                title: titleText,
                author: authorText,
                type: fileType,
                currPage: 0,
                totalPages: isPdf ? 150 : 320,
                carryForward,
                coverUrl: tacticalLibraryState.activeExtractedCover,
                created_at: new Date().toISOString()
            };

            tacticalLibraryState.books.unshift(metaRecord);
            localStorage.setItem('axis_library_meta', JSON.stringify(tacticalLibraryState.books));

            renderLibraryView();
            refreshCoreView();

        }).catch(err => {
            alert("IDB save failed: " + err);
        });
    };

    if (fileType === 'pdf') {
        reader.readAsDataURL(file);
    } else {
        reader.readAsArrayBuffer(file);
    }
}

function stepTacticalBookPage(bookId, stepAmount) {
    let b = tacticalLibraryState.books.find(x => x.id === bookId);
    if (!b) return;

    b.currPage = Math.min(b.totalPages, Math.max(0, b.currPage + stepAmount));
    if (b.currPage === b.totalPages) b.carryForward = false;
    
    todayTelemetry.lastLoggedTimestamp = Date.now();
    localStorage.setItem('axis_last_logged_time', todayTelemetry.lastLoggedTimestamp);
    localStorage.setItem('axis_library_meta', JSON.stringify(tacticalLibraryState.books));

    renderLibraryView();
    refreshCoreView();
}

function purgeTacticalBook(bookId) {
    if (confirm("PURGE TEXT AND Erase BINARY FROM STORAGE?")) {
        tacticalLibraryState.books = tacticalLibraryState.books.filter(x => x.id !== bookId);
        localStorage.setItem('axis_library_meta', JSON.stringify(tacticalLibraryState.books));
        
        deleteBookBinaryFromIDB(bookId);
        
        if (tacticalLibraryState.activeBookId === bookId) closeTrueInlineReader();
        renderLibraryView();
    }
}

function executeTrueInlineReader(bookId) {
    let b = tacticalLibraryState.books.find(x => x.id === bookId);
    if (!b) return;

    tacticalLibraryState.activeBookId = bookId;
    tacticalLibraryState.readerType = b.type;
    renderLibraryView();

    let titleEl = document.getElementById('true-reader-book-title');
    let badgeEl = document.getElementById('true-reader-mode-badge');
    let themeTools = document.getElementById('epub-theme-tools');
    let fontTools = document.getElementById('epub-font-tools');
    let viewportArea = document.getElementById('true-reader-viewport-area');
    let statusEl = document.getElementById('reader-telemetry-status');

    if(titleEl) titleEl.textContent = `${b.title} // ${b.author}`;
    if(badgeEl) badgeEl.textContent = `MODE: ${b.type.toUpperCase()} VIEWPORT`;
    if(themeTools) themeTools.style.display = b.type === 'epub' ? 'flex' : 'none';
    if(fontTools) fontTools.style.display = b.type === 'epub' ? 'flex' : 'none';
    if(statusEl) statusEl.textContent = `FETCHING BINARY FROM INDEXEDDB FORTRESS...`;

    viewportArea.innerHTML = `<div style="padding: 40px; font-family: var(--font-mono); color: var(--hud-cyan);">EXTRACTING RAW BINARY FROM IDB MEMORY...</div>`;

    getBookBinaryFromIDB(bookId).then(content => {
        if (!content) {
            viewportArea.innerHTML = `<div style="padding: 40px; color: var(--hud-critical); font-family: var(--font-mono);">⚠️ STORAGE FAULT: Binary not found in local IDB memory. Please deposit file again.</div>`;
            return;
        }

        if (b.type === 'pdf') {
            viewportArea.innerHTML = `
                <iframe src="${content}#toolbar=0&view=FitH" style="width: 100%; flex: 1; height: 100%; min-height: 700px; border: none; background: #fff;" title="${b.title}"></iframe>
            `;
            statusEl.textContent = `PDF EMBED // OPTIMAL`;
        } else {
            viewportArea.innerHTML = `<div id="genuine-epub-render-target" style="width: 100%; flex: 1; height: 100%; min-height: 700px; display: flex; flex-direction: column; padding: 24px; overflow-y: auto;"></div>`;
            
            try {
                tacticalLibraryState.epubBookInstance = ePub(content);
                tacticalLibraryState.epubRendition = tacticalLibraryState.epubBookInstance.renderTo("genuine-epub-render-target", {
                    width: "100%",
                    height: "100%",
                    flow: "paginated"
                });

                // Apply professional enterprise Dark / Light / Sepia Themes
                tacticalLibraryState.epubRendition.themes.register("axis_dark", {
                    "body": { "background": "#03050a", "color": "#f1f5f9", "font-family": "system-ui, sans-serif", "line-height": "1.7" },
                    "p": { "font-size": "1.15rem" },
                    "h1, h2, h3": { "color": "#38bdf8", "font-family": "monospace", "text-transform": "uppercase" }
                });
                tacticalLibraryState.epubRendition.themes.register("axis_light", {
                    "body": { "background": "#f8fafc", "color": "#0f172a", "font-family": "system-ui, sans-serif", "line-height": "1.7" },
                    "p": { "font-size": "1.15rem" },
                    "h1, h2, h3": { "color": "#7e22ce", "font-family": "monospace", "text-transform": "uppercase" }
                });
                tacticalLibraryState.epubRendition.themes.register("axis_sepia", {
                    "body": { "background": "#fef3c7", "color": "#451a03", "font-family": "Georgia, serif", "line-height": "1.7" },
                    "p": { "font-size": "1.15rem" },
                    "h1, h2, h3": { "color": "#9a3412", "font-family": "monospace", "text-transform": "uppercase" }
                });

                tacticalLibraryState.epubRendition.themes.select(tacticalLibraryState.currentTheme);
                tacticalLibraryState.epubRendition.display();

                tacticalLibraryState.epubRendition.on("relocated", function(location) {
                    statusEl.textContent = `EPUB RENDITION // CFI: ${location.start.cfi}`;
                });

            } catch(epubErr) {
                viewportArea.innerHTML = `<div style="padding: 40px; color: var(--hud-critical); font-family: var(--font-mono);">⚠️ EPUB ENGINE FAULT: ${epubErr.message || epubErr}</div>`;
            }
        }
    }).catch(err => {
        viewportArea.innerHTML = `<div style="padding: 40px; color: var(--hud-critical); font-family: var(--font-mono);">⚠️ IDB FAULT: ${err}</div>`;
    });

    setTimeout(() => {
        document.getElementById('tactical-true-reader-container').scrollIntoView({ behavior: 'smooth' });
    }, 150);
}

function applyGenuineEPUBTheme(themeName) {
    tacticalLibraryState.currentTheme = themeName;
    if (tacticalLibraryState.epubRendition) {
        tacticalLibraryState.epubRendition.themes.select(themeName);
    }
    document.querySelectorAll('#epub-theme-tools button').forEach(b => {
        b.classList.remove('active', 'cyan');
    });
    let activeBtn = document.querySelector(`#epub-theme-tools button[onclick*="${themeName}"]`);
    if(activeBtn) activeBtn.classList.add('active', 'cyan');
}

function closeTrueInlineReader() {
    tacticalLibraryState.activeBookId = null;
    if (tacticalLibraryState.epubBookInstance) {
        try { tacticalLibraryState.epubBookInstance.destroy(); } catch(e){}
        tacticalLibraryState.epubBookInstance = null;
        tacticalLibraryState.epubRendition = null;
    }
    renderLibraryView();
}

function scaleEPUBFontSize(dir) {
    if (tacticalLibraryState.epubRendition) {
        let currentSize = tacticalLibraryState.epubRendition.themes._fontSize || 100;
        let newSize = Math.max(80, Math.min(180, currentSize + (dir * 10)));
        tacticalLibraryState.epubRendition.themes.fontSize(`${newSize}%`);
    }
}

function navigateGenuineReader(dir) {
    if (!tacticalLibraryState.activeBookId) return;
    
    if (tacticalLibraryState.readerType === 'epub' && tacticalLibraryState.epubRendition) {
        if (dir > 0) {
            tacticalLibraryState.epubRendition.next();
        } else {
            tacticalLibraryState.epubRendition.prev();
        }
    } else {
        stepTacticalBookPage(tacticalLibraryState.activeBookId, dir);
    }
}

function toggleDesignTask(pIdx, tIdx) {
    let t = designProjects[pIdx].tasks[tIdx];
    t.completed = !t.completed;
    if(t.completed) t.carryForward = false; // resolved

    // compute updated sprint progress
    let proj = designProjects[pIdx];
    let compCount = proj.tasks.filter(x => x.completed).length;
    proj.sprintProgress = Math.round((compCount / proj.tasks.length) * 100);

    localStorage.setItem('axis_design_projects', JSON.stringify(designProjects));
    renderDesignView();
}

function handleInjectDesignTask(e) {
    e.preventDefault();
    let pIdx = parseInt(document.getElementById('task-inj-proj').value);
    let title = document.getElementById('task-inj-title').value.trim();
    let carryForward = document.getElementById('task-inj-carry').checked;

    if(!title) return;

    let newTask = {
        id: "dt-" + Date.now(),
        title,
        completed: false,
        carryForward
    };

    designProjects[pIdx].tasks.push(newTask);

    // compute updated sprint progress
    let proj = designProjects[pIdx];
    let compCount = proj.tasks.filter(x => x.completed).length;
    proj.sprintProgress = Math.round((compCount / proj.tasks.length) * 100);

    localStorage.setItem('axis_design_projects', JSON.stringify(designProjects));
    renderDesignView();
}

function refreshDesignView() {
    renderDesignView();
}

function handleSaveNameConfig(e) {
    e.preventDefault();
    let name = document.getElementById('config-input-name').value.trim() || 'COMMANDER';
    hudConfigState.commanderName = name;
    localStorage.setItem('axis_commander_name', name);
    
    // Trigger update on Core Home
    if (typeof refreshCoreView === 'function') refreshCoreView();
    renderConfigView();
}

function handleSelectTheme(newTheme) {
    hudConfigState.theme = newTheme;
    localStorage.setItem('axis_theme', newTheme);
    applyStoredTheme(newTheme);
    renderConfigView();
}

function applyStoredTheme(themeName) {
    if(themeName === 'cyan') {
        document.documentElement.style.setProperty('--hud-violet', '#38bdf8');
        document.documentElement.style.setProperty('--hud-violet-glow', 'rgba(56, 189, 248, 0.4)');
        document.documentElement.style.setProperty('--hud-violet-subtle', 'rgba(56, 189, 248, 0.15)');
    } else if(themeName === 'optimal') {
        document.documentElement.style.setProperty('--hud-violet', '#10b981');
        document.documentElement.style.setProperty('--hud-violet-glow', 'rgba(16, 185, 129, 0.4)');
        document.documentElement.style.setProperty('--hud-violet-subtle', 'rgba(16, 185, 129, 0.15)');
    } else if(themeName === 'warning') {
        document.documentElement.style.setProperty('--hud-violet', '#f59e0b');
        document.documentElement.style.setProperty('--hud-violet-glow', 'rgba(245, 158, 11, 0.4)');
        document.documentElement.style.setProperty('--hud-violet-subtle', 'rgba(245, 158, 11, 0.15)');
    } else {
        // default violet
        document.documentElement.style.setProperty('--hud-violet', '#a855f7');
        document.documentElement.style.setProperty('--hud-violet-glow', 'rgba(168, 85, 247, 0.4)');
        document.documentElement.style.setProperty('--hud-violet-subtle', 'rgba(168, 85, 247, 0.15)');
    }
}

function handleSaveSupabaseKeys(e) {
    e.preventDefault();
    let url = document.getElementById('config-sub-url').value.trim();
    let key = document.getElementById('config-sub-key').value.trim();

    hudConfigState.supabaseUrl = url;
    hudConfigState.supabaseKey = key;
    localStorage.setItem('axis_supabase_url', url);
    localStorage.setItem('axis_supabase_key', key);

    // reinit supabase client
    if(typeof supabaseClient !== 'undefined') {
        supabaseClient.url = url;
        supabaseClient.key = key;
    }
    if(typeof initSupabase === 'function') initSupabase();
    
    renderConfigView();
}

function toggleModuleNavTab(targetMod) {
    let idx = hudConfigState.hiddenModules.indexOf(targetMod);
    if(idx === -1) {
        hudConfigState.hiddenModules.push(targetMod);
    } else {
        hudConfigState.hiddenModules.splice(idx, 1);
    }
    localStorage.setItem('axis_hidden_modules', JSON.stringify(hudConfigState.hiddenModules));
    updateNavTabsVisibility();
    renderConfigView();
}

function updateNavTabsVisibility() {
    ['fitness', 'sleep', 'music', 'library', 'design', 'nutrition', 'finance'].forEach(mod => {
        let btn = document.getElementById(`tab-${mod}`);
        if(btn) {
            let isHidden = hudConfigState.hiddenModules.includes(mod);
            btn.style.display = isHidden ? 'none' : 'inline-block';
        }
    });
}

function handleFactoryReset() {
    if(confirm("CRITICAL WARNING: Purge all local AXIS OS data, session logs, and credentials from this device?")) {
        localStorage.clear();
        window.location.reload();
    }
}
